name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      filter:
        description: 'BenchmarkDotNet filter (e.g. *InsertBenchmarks*)'
        required: false
        default: '*'

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0

    - name: Run benchmarks
      run: >
        dotnet run -c Release
        --project benchmarks/Winnow.Benchmarks
        --
        --filter '${{ github.event.inputs.filter }}'

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: BenchmarkDotNet.Artifacts/
